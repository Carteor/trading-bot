models:
  - name: stg_prices
    description: "Raw prices enriched with technical indicators"
    columns:
      - name: symbol
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name:  date
        description: "Trading date"
        tests:
          - not_null
      - name: close
        description: "Closing price"
        tests:
          - not_null
