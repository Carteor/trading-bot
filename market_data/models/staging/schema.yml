models:
  - name: stg_prices
    description: "Raw OHHLCV prices enriched with technical indicators computed per symbol"
    columns:
      - name: symbol
        description: "Stock ticker symbol e.g. AAPL, MSFT"
        tests:
          - not_null
      - name:  date
        description: "Trading date"
        tests:
          - not_null
      - name: close
        description: "Closing price"
        tests:
          - not_null
      - name: ma_7
        description: "7-day moving average of closing price"
      - name: ma_21
        description: "21-day moving average of closing price"
      - name: rsi_14
        description: "14-day Relative Strength Index"
      - name: daily_return
        description: "Day over day percentage change in closing price"
      - name: volatility_21
        description: "21-day rolling standard deviation of daily returns"

  - name: stg_economic_indicators
    description: "Economic indicators from FRED API"
    columns:
      - name: series_id
        description: "FRED series identifier"
        tests:
          - not_null
      - name: date
        description: "Observation date"
        tests:
          - not_null
      - name: value
        description: "Indicator value"
        tests:
          - not_null
