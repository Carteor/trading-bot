services:
  db:
    image: postgres:16
    restart: always
    env_file: ".env"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - trading_net

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file: ".env"
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - trading_net

networks:
  trading_net:

volumes:
  pgdata:
